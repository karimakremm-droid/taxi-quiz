    card.innerHTML='<span class="card-num">#'+(i+1)+'</span><div><span class="card-year '+yearClass(item.y)+'">'+item.y+'</span><span class="card-cat"> · '+item.cat+'</span></div><div class="card-q">'+item.q+'</div><div class="card-a">✅ '+item.a+'</div><div class="card-hint">اضغط لإظهار الإجابة</div>';
    card.onclick=()=>card.classList.toggle('revealed');
    grid.appendChild(card);
  });
  document.getElementById('browseView').innerHTML='';
  document.getElementById('browseView').appendChild(grid);
}
function startQuiz(){quizList=getFiltered();quizIdx=0;correct=0;wrong=0;renderQuiz()}
function renderQuiz(){
  const qv=document.getElementById('quizView');
  if(!quizList.length){qv.innerHTML='<div class="empty">لا توجد أسئلة 🔍</div>';return}
  if(quizIdx>=quizList.length){
    const pct=Math.round(correct/quizList.length*100);
    qv.innerHTML='<div class="quiz-container"><div class="quiz-card"><div style="font-size:3rem;margin-bottom:16px">🏆</div><h2 style="color:#c9a84c;margin-bottom:12px">انتهت الأسئلة!</h2><p style="font-size:1.1rem;margin-bottom:8px">النتيجة: <strong style="color:#c9a84c">'+correct+'/'+quizList.length+'</strong></p><p style="font-size:1.3rem;color:#27ae60;font-weight:700">'+pct+'%</p><button class="btn-shuffle" style="margin-top:20px" onclick="startQuiz()">🔄 إعادة</button></div></div>';
    return;
  }
  const item=quizList[quizIdx];
  const pct=Math.round(quizIdx/quizList.length*100);
  qv.innerHTML='<div class="quiz-container"><div class="quiz-score">✅ صحيح: <span>'+correct+'</span> &nbsp; ❌ خطأ: <span style="color:#e74c3c">'+wrong+'</span></div><div class="quiz-card"><div class="quiz-progress"><div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div><div class="quiz-counter">'+(quizIdx+1)+' / '+quizList.length+'</div></div><div style="margin-bottom:16px"><span class="card-year '+yearClass(item.y)+'">'+item.y+'</span> · '+item.cat+'</div><div class="quiz-q">'+item.q+'</div><div class="quiz-answer" id="qAnswer">✅ '+item.a+'</div><div class="quiz-btns"><button class="btn-show" onclick="showAnswer()">👁️ إظهار الإجابة</button></div><div class="score-btns" id="scoreBtns"><button class="btn-correct" onclick="markCorrect()">✅ أجبت صح</button><button class="btn-wrong" onclick="markWrong()">❌ أجبت غلط</button></div></div></div>';
}
function showAnswer(){document.getElementById('qAnswer').style.display='block';document.querySelector('.quiz-btns').style.display='none';document.getElementById('scoreBtns').style.display='flex'}
function markCorrect(){correct++;quizIdx++;renderQuiz()}
function markWrong(){wrong++;quizIdx++;renderQuiz()}
renderAll();
</script>
